services:
  pixel-agents:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-13001}:13001"
    volumes:
      # 持久化使用者資料（佈局、代理、設定等）
      - "${DATA_DIR:-~/.pixel-agents}:/home/pixelagents/.pixel-agents"
    environment:
      - PORT=13001
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DEMO=${DEMO:-0}
      - DEMO_AGENTS=${DEMO_AGENTS:-3}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - DATA_DIR=/home/pixelagents/.pixel-agents
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

